name: Terraform

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
  TF_WORKSPACE: ${{ vars.TF_WORKSPACE }}

jobs:
  terraform-check:
    name: terraform-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.8
      - name: Check formatting
        run: terraform fmt -check -recursive
      - name: Initialize providers without a backend
        run: terraform init -backend=false -input=false
      - name: Validate configuration
        run: terraform validate

  terraform-apply:
    name: terraform-apply
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.ENABLE_TERRAFORM_APPLY == 'true'
    needs: terraform-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.INFRA_GITHUB_TOKEN }}
      TF_VAR_supabase_organization_id: ${{ vars.SUPABASE_ORGANIZATION_ID }}
      TF_VAR_supabase_database_password: ${{ secrets.SUPABASE_DB_PASSWORD }}
      TF_VAR_app_url: ${{ vars.APP_URL }}
      TF_VAR_turnstile_site_key: ${{ secrets.TURNSTILE_SITE_KEY }}
      TF_VAR_turnstile_secret_key: ${{ secrets.TURNSTILE_SECRET_KEY }}
      TF_VAR_enable_github_ruleset: "true"
      TF_VAR_required_approvals: ${{ vars.REQUIRED_APPROVALS || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.8
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - name: Initialize encrypted remote state
        run: terraform init -input=false
      - name: Apply reviewed main branch
        run: terraform apply -auto-approve -input=false
