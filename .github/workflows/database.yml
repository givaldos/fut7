name: Database

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: database-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  database:
    name: database
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1
      - name: Start local database
        run: supabase db start
      - name: Rebuild schema from migrations
        run: supabase db reset
      - name: Lint database
        run: supabase db lint --level warning
      - name: Test RLS and constraints
        run: supabase test db
      - name: Verify generated database types
        run: |
          supabase gen types typescript --local > /tmp/database.types.ts
          diff --strip-trailing-cr lib/database.types.ts /tmp/database.types.ts

