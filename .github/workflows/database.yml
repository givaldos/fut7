name: Database

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: database-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  database:
    name: database
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: 2.109.1
      - name: Start local database
        run: supabase db start
      - name: Rebuild schema from migrations
        run: supabase db reset
      - name: Lint database
        run: supabase db lint --level warning
      - name: Test RLS and constraints
        run: supabase test db
      - name: Verify generated database types
        run: |
          supabase gen types typescript --local > /tmp/database.types.ts
          diff --strip-trailing-cr lib/database.types.ts /tmp/database.types.ts

