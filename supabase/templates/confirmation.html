<!doctype html>
<html lang="pt-BR">
  <body style="margin: 0; background: #f4f4f5; color: #18181b; font-family: Arial, sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding: 32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 520px; background: #ffffff; border-radius: 16px; padding: 32px;">
            <tr>
              <td>
                <p style="margin: 0 0 8px; color: #16a34a; font-size: 14px; font-weight: 700;">FUT7</p>
                <h1 style="margin: 0 0 16px; font-size: 24px; line-height: 1.25;">Confirme seu e-mail</h1>
                <p style="margin: 0 0 24px; color: #52525b; font-size: 16px; line-height: 1.5;">
                  Confirme este endereço para concluir a criação da sua conta de administrador.
                </p>
                <p style="margin: 0 0 24px;">
                  <a
                    href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&amp;type=email&amp;next=/app"
                    style="display: inline-block; border-radius: 10px; background: #16a34a; color: #ffffff; padding: 12px 20px; font-size: 16px; font-weight: 700; text-decoration: none;"
                  >Confirmar e-mail</a>
                </p>
                <p style="margin: 0; color: #71717a; font-size: 13px; line-height: 1.5;">
                  Este link é pessoal e expira em poucos minutos. Se você não criou esta conta, ignore esta mensagem.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
